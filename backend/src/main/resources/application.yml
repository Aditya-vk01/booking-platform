spring:
  application:
    name: booking-platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${SPRING_DATASOURCE_USERNAME:booking_user}
    password: ${SPRING_DATASOURCE_PASSWORD:booking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:rabbit_user}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbit_pass}

jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast256BitsLong1234567890}
  expiration-ms: 86400000

logging:
  level:
    com.booking: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
